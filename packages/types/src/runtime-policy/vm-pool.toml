version = 1

[vm_pool]
enabled = true
max_total_vms = 6
per_profile_max_idle = 2
idle_ttl_seconds = 1200
startup_timeout_seconds = 45
reuse_key = [
  "profile_name",
  "smolfile_digest",
  "network_policy_digest",
  "mount_policy_digest",
  "auth_mode",
]

[phase2_test_overrides]
enabled = false
idle_ttl_seconds = 1200
