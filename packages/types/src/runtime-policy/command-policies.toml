version = 1

[command_policies.strict_readonly]
default_action = "deny"
match_mode = "normalized_command"

[[command_policies.strict_readonly.rules]]
id = "git_status"
match = "git status*"
action = "allow"

[[command_policies.strict_readonly.rules]]
id = "git_diff"
match = "git diff*"
action = "allow"

[[command_policies.strict_readonly.rules]]
id = "list_files"
match = "ls*"
action = "allow"


[command_policies.research_safe]
default_action = "deny"
match_mode = "normalized_command"

[[command_policies.research_safe.rules]]
id = "git_status"
match = "git status*"
action = "allow"

[[command_policies.research_safe.rules]]
id = "git_diff"
match = "git diff*"
action = "allow"

[[command_policies.research_safe.rules]]
id = "curl_url"
match = "curl *"
action = "allow"


[command_policies.build_standard]
