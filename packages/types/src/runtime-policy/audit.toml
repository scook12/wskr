version = 1

[audit]
sink = "file"
path = "{stateDir}/runtime-policy-audit.ndjson"
include = [
  "timestamp",
  "session_id",
  "message_id",
  "agent_name",
  "is_subagent",
  "resolved_profile",
  "normalized_command",
  "decision",
  "decision_reason",
  "vm_id",
  "vm_booted_at_ms",
  "exit_code",
  "duration_ms",
]
