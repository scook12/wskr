version = 1

[transitions]
enabled = true
default_action = "deny"

[[transitions.rules]]
from = "*"
to = ["strict"]
action = "allow"

[[transitions.rules]]
from = "strict"
to = ["research", "build", "verify"]
action = "ask"

[[transitions.rules]]
from = "research"
to = ["build", "verify"]
action = "ask"

[[transitions.rules]]
from = "build"
to = ["verify"]
action = "allow"

[[transitions.rules]]
from = "*"
to = ["release"]
action = "ask"
