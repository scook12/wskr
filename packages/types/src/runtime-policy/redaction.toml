version = 1

[redaction]
enabled = true
fail_mode = "block"

[[redaction.rules]]
id = "bearer_token"
type = "regex"
pattern = '[Bb][Ee][Aa][Rr][Ee][Rr]\s+[A-Za-z0-9._-]{20,}'
replacement = "[REDACTED:TOKEN]"

[[redaction.rules]]
id = "private_key_header"
type = "regex"
pattern = '-----BEGIN (RSA|EC|OPENSSH|PGP) PRIVATE KEY-----'
replacement = "[REDACTED:PRIVATE_KEY]"
