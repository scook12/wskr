telemetry = false
env = false

[test]
coverage = true
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  "**/node_modules/**",
  "**/vendor/**",
  "**/dist/**",
]

[install]
minimumReleaseAge = 259200
minimumReleaseAgeExcludes = [
  "workspace*",
  "@wskr/types",
  "@wskr/server",
  "@wskr/client",
  "@wskr/agent-sandbox-provider",
  "@wskr/opencode-plugin",
]

